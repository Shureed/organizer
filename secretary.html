<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Secretary">
<title>Secretary</title>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #db6d28;
    --purple: #bc8cff;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13, 17, 23, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Search bar */
  .search-bar-container {
    position: relative;
    margin-top: 10px;
  }
  .search-input {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder {
    color: var(--text-muted);
  }
  .search-input:focus {
    border-color: var(--accent);
  }
  .search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    max-height: 400px;
    overflow-y: auto;
    display: none;
    z-index: 1000;
  }
  .search-results.visible {
    display: block;
  }
  .search-result-item {
    padding: 12px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-result-item:last-child {
    border-bottom: none;
  }
  .search-result-item:active {
    background: var(--surface2);
  }
  .search-result-item:hover {
    background: var(--surface2);
  }
  .search-result-type {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }
  .search-result-title {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .search-result-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .search-empty {
    padding: 16px 12px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .search-closed-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    padding: 2px 0;
  }
  .search-closed-toggle .toggle-pill {
    width: 32px;
    height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .search-closed-toggle .toggle-pill::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--text-muted);
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: left 0.2s, background 0.2s;
  }
  .search-closed-toggle.active .toggle-pill {
    background: var(--accent);
  }
  .search-closed-toggle.active .toggle-pill::after {
    left: 16px;
    background: white;
  }
  .search-result-item.closed {
    opacity: 0.65;
  }
  .search-result-item.closed .search-result-title {
    text-decoration: line-through;
  }

  /* Tab bar */
  .tabs {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(22, 27, 34, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 500;
    padding: 6px 12px;
    cursor: pointer;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active { color: var(--accent); }
  .tab svg { width: 22px; height: 22px; }
  .tab .badge {
    position: absolute;
    top: 2px;
    right: 2px;
    background: var(--red);
    color: white;
    font-size: 9px;
    font-weight: 700;
    border-radius: 8px;
    min-width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }
  .tab .icon-wrap { position: relative; }

  /* Content area */
  .content { padding: 16px 20px; }
  .view { display: none; }
  .view.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { background: var(--surface2); }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .card-body {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.4;
    white-space: pre-wrap;
  }

  /* Status chips */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .chip-open { background: rgba(88,166,255,0.15); color: var(--accent); }
  .chip-progress { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .chip-waiting { background: rgba(219,109,40,0.15); color: var(--orange); }
  .chip-done { background: rgba(63,185,80,0.15); color: var(--green); }
  .chip-hold { background: rgba(188,140,255,0.15); color: var(--purple); }
  .chip-cancelled { background: rgba(248,81,73,0.15); color: var(--red); }

  /* Space pill */
  .space-pill {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 8px;
  }

  /* Insights */
  .insight-card { border-left: 3px solid var(--border); }
  .insight-card.priority-high { border-left-color: var(--red); }
  .insight-card.priority-medium { border-left-color: var(--yellow); }
  .insight-card.priority-low { border-left-color: var(--accent); }
  .insight-body {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 5px;
    line-height: 1.45;
  }
  .insight-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .insight-type-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 6px;
  }
  .insights-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
  }
  .insights-empty-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }
  .insights-empty-sub { font-size: 13px; line-height: 1.4; }

  /* Recents type badge */
  .recent-type-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .recent-type-task { background: rgba(88,166,255,0.12); color: var(--accent); }
  .recent-type-project { background: rgba(63,185,80,0.12); color: var(--green); }

  /* Section headers */
  .section-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 20px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-header:first-child { margin-top: 0; }

  /* Space tree styles */
  .space-root-header {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    padding: 12px 0 8px;
    margin-top: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .space-root-header:first-of-type { margin-top: 0; }
  .space-child {
    margin-left: 16px;
    margin-bottom: 8px;
  }
  .space-child.depth-2 { margin-left: 32px; }
  .space-child.depth-3 { margin-left: 48px; }
  .space-child.depth-4 { margin-left: 64px; }

  /* Quick stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: calc(72px + env(safe-area-inset-bottom));
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(88,166,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 90;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .fab:active { transform: scale(0.92); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 20px calc(20px + env(safe-area-inset-bottom));
  }
  .modal h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .modal label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    margin-top: 14px;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus {
    border-color: var(--accent);
  }
  .modal textarea { resize: vertical; min-height: 80px; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:active { opacity: 0.8; }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
  }
  .btn-secondary:active { background: var(--border); }
  .btn-danger {
    background: rgba(248,81,73,0.15);
    color: var(--red);
  }
  .btn-danger:active { opacity: 0.8; }

  /* Detail modal */
  #detailModal .modal { max-height: 90vh; }
  #detailModal h2 {
    font-size: 20px;
    margin-bottom: 12px;
  }
  .detail-actions {
    display: flex;
    gap: 10px;
  }
  .detail-actions .btn { flex: 1; }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: calc(90px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    max-width: 90%;
    font-size: 13px;
    font-weight: 500;
    z-index: 210;
    pointer-events: none;
    animation: slideUp 0.3s ease-out;
  }
  .toast.error { border-color: var(--red); color: var(--red); }
  @keyframes slideUp {
    from { transform: translateX(-50%) translateY(100%); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    font-size: 14px;
  }

  /* Calendar */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cal-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    line-height: 1;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .cal-nav-btn:active { background: var(--border); }
  .cal-month-label {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 14px;
  }
  .cal-dow {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 4px 0 6px;
  }
  .cal-day {
    min-height: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 3px 3px;
    cursor: pointer;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }
  .cal-day:active { background: var(--surface2); }
  .cal-day.other-month { opacity: 0.3; pointer-events: none; }
  .cal-day.today { border-color: var(--accent); }
  .cal-day.selected {
    background: rgba(88,166,255,0.1);
    border-color: var(--accent);
  }
  .cal-day-num {
    font-size: 11px;
    font-weight: 600;
    text-align: right;
    color: var(--text-muted);
    margin-bottom: 3px;
    line-height: 1;
  }
  .cal-day.today .cal-day-num { color: var(--accent); }
  .cal-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    align-items: center;
  }
  .cal-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cal-more {
    font-size: 8px;
    color: var(--text-muted);
    font-weight: 600;
    line-height: 1;
  }
  .cal-day-tasks {
    margin-bottom: 6px;
  }
  .cal-card-done { opacity: 0.45; }
  .cal-card-done .card-title { text-decoration: line-through; }
  .cal-day-tasks-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 4px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Collapsible sections */
  .collapsible-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 20px 0 0;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
  }
  .collapsible-header:active { opacity: 0.7; }
  .section-meta {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-count {
    font-size: 11px;
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0;
  }
  .chevron {
    font-size: 10px;
    transition: transform 0.2s;
    display: inline-block;
  }
  .collapsible-section:not(.collapsed) .chevron {
    transform: rotate(90deg);
  }
  .collapsible-body {
    margin-top: 10px;
  }
  .collapsible-section.collapsed .collapsible-body {
    display: none;
  }

  /* Activity log entries */
  .log-entry {
    border-left: 3px solid var(--border);
    padding: 8px 12px;
    margin-bottom: 8px;
    background: var(--surface);
    border-radius: 0 8px 8px 0;
    cursor: pointer;
    transition: background-color 0.2s ease, border-left-color 0.2s ease;
  }
  .log-entry:hover {
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .log-summary {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .log-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .log-empty {
    font-size: 13px;
    color: var(--text-muted);
    padding: 12px 0;
    text-align: center;
  }
  /* Comment thread styles */
  .comment-thread {
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .comment-thread .section-header {
    margin-bottom: 12px;
  }
  .thread {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 300px;
    overflow-y: auto;
    margin-bottom: 12px;
  }
  .comment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
  }
  .comment-card.claude {
    border-left: 3px solid var(--purple);
  }
  .comment-avatar {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
  }
  .comment-avatar svg {
    width: 16px;
    height: 16px;
    color: var(--text-muted);
  }
  .comment-body {
    flex: 1;
    min-width: 0;
  }
  .comment-header {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .comment-author {
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
  }
  .comment-model {
    font-size: 10px;
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--accent);
  }
  .comment-time {
    font-size: 11px;
    color: var(--text-muted);
  }
  .comment-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
  }
  .thinking-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);

<script>
const API_URL = 'https://blwymionidfxwrpacfrb.supabase.co/rest/v1/';
const SUPABASE_URL = 'https://blwymionidfxwrpacfrb.supabase.co';
const PUBLISHABLE_KEY = 'sb_publishable_V90DY_uoWFs3F5Nr_OZizA_OgzJVefv';

// Auth state — session is managed by Supabase JS client
let _supabaseClient = null;
let _session = null;
let _loadInterval = null;

function getSupabaseClient() {
  if (!_supabaseClient) {
    _supabaseClient = window.supabase.createClient(SUPABASE_URL, PUBLISHABLE_KEY, {
      auth: {
        storage: window.localStorage,
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
      },
    });
  }
  return _supabaseClient;
}

function getAuthToken() {
  return _session?.access_token || null;
}

function startApp() {
  if (_loadInterval) return; // guard against double-init
  document.getElementById('loginGate').style.display = 'none';
  loadAll();
  _loadInterval = setInterval(() => { loadAll(); }, 30000);
}

const SITE_URL = 'https://shureed.github.io/organizer/secretary.html';

async function sendMagicLink() {
  const email = document.getElementById('loginEmail').value.trim();
  const msg = document.getElementById('loginMsg');
  if (!email) { msg.textContent = 'Please enter your email.'; return; }
  msg.style.color = 'var(--text-muted)';
  msg.textContent = 'Sending…';
  const { error } = await getSupabaseClient().auth.signInWithOtp({
    email,
    options: { emailRedirectTo: SITE_URL }
  });
  if (error) {
    msg.style.color = 'var(--red)';
    msg.textContent = 'Error: ' + error.message;
  } else {
    msg.style.color = 'var(--green)';
    msg.textContent = '✓ Check your email for the magic link';
    document.getElementById('loginEmail').disabled = true;
    document.getElementById('loginGate').querySelector('button').disabled = true;
  }
}

let allTasks = [];
let allProjects = [];
let allInsights = [];
let allClosedTasks = [];
let allClosedProjects = [];
let allSpaces = [];
let allRecentItems = [];
let showClosedSearch = sessionStorage.getItem('showClosedSearch') === 'true';
let allSpaceTree = [];
let allInbox = [];
let allActivityLog = [];
let allCompletedToday = [];
let notifChipCache = {}; // keyed by notification ID → cached chip HTML
let currentView = 'today';
let calendarYear = new Date().getFullYear();
let calendarMonth = new Date().getMonth();
let calendarSelectedDay = null;

// Task list filter state (Today view)
let todayFilterType = '';
let todayFilterPriority = '';

async function api(endpoint, opts = {}) {
  const url = API_URL + endpoint;
  const res = await fetch(url, {
    ...opts,
    headers: {
      ...(getAuthToken() ? { 'Authorization': `Bearer ${getAuthToken()}` } : {}),
      'apikey': PUBLISHABLE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...opts.headers
    }
  });
  if (!res.ok) {
    const errBody = await res.text();
    const err = new Error(`API ${res.status}: ${errBody}`);
    console.error('API Error:', endpoint, res.status, errBody);
    throw err;
  }
  return res.json();
}

async function loadAll() {
  const spinStart = Date.now();
  document.getElementById('refreshIcon')?.classList.add('spinning');
  const stopSpinner = () => {
    const elapsed = Date.now() - spinStart;
    setTimeout(() => document.getElementById('refreshIcon')?.classList.remove('spinning'), Math.max(0, 700 - elapsed));
  };
  try {
    // Compute today's start in ET (UTC-4 during EDT) as UTC for the completed_at filter
    const etOffsetMs = 4 * 60 * 60 * 1000;
    const nowUtc = Date.now();
    const nowEt = new Date(nowUtc - etOffsetMs);
    const todayEtStart = new Date(Date.UTC(nowEt.getUTCFullYear(), nowEt.getUTCMonth(), nowEt.getUTCDate()) + etOffsetMs).toISOString();

    const [tasks, projects, spaces, spaceTree, inbox, activityLog, completedToday, closedTasks, closedProjects, recentTasks, recentProjects, insights] = await Promise.all([
      api('v_active_tasks?order=date.asc.nullslast'),
      api('v_active_projects?order=name.asc'),
      api('spaces?archived=eq.false&order=name.asc'),
      api('v_space_tree?order=path.asc'),
      api('v_new_inbox?order=created_at.desc'),
      api('v_today_activity?order=timestamp.desc'),
      api(`tasks?status=eq.Done&archived=eq.false&completed_at=gte.${todayEtStart}&select=id,name,completed_at,project_id&order=completed_at.asc`),
      api('tasks?status=in.(Done,Cancelled)&archived=eq.false&select=id,name,status,date,type,priority&order=name.asc'),
      api('projects?status=in.(Done,Cancelled)&archived=eq.false&select=id,name,status&order=name.asc'),
      api('tasks?archived=eq.false&order=updated_at.desc&limit=20&select=id,name,status,updated_at,type,priority'),
      api('projects?archived=eq.false&order=updated_at.desc&limit=10&select=id,name,status,updated_at'),
      api('insights?order=priority.asc,generated_at.desc'),
    ]);
    allTasks = tasks || [];
    allProjects = projects || [];
    allClosedTasks = closedTasks || [];
    allClosedProjects = closedProjects || [];
    allSpaces = spaces || [];
    allSpaceTree = spaceTree || [];
    allInbox = inbox || [];
    allActivityLog = activityLog || [];
    allCompletedToday = completedToday || [];
    const merged = [
      ...(recentTasks || []).map(t => ({ ...t, _type: 'Task' })),
      ...(recentProjects || []).map(p => ({ ...p, _type: 'Project' })),
    ];
    merged.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
    allRecentItems = merged.slice(0, 25);
    allInsights = (insights || []).filter(i => !i.expires_at || new Date(i.expires_at) > new Date());
    const openSections = [...document.querySelectorAll('.collapsible-section:not(.collapsed)')]
      .map(el => el.id).filter(Boolean);
    const savedScrollY = window.scrollY;
    await renderAll();
    openSections.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('collapsed');
    });
    await new Promise(resolve => requestAnimationFrame(resolve));
    window.scrollTo({ top: savedScrollY, behavior: 'instant' });
    stopSpinner();
  } catch (e) {
    stopSpinner();
    console.error('loadAll failed:', e);
    showToast('Failed to load data', true);
    document.getElementById('headerSub').textContent = 'Error: ' + e.message;
    document.getElementById('view-today').innerHTML = `<div class="empty" style="color:var(--red);white-space:pre-wrap;text-align:left;font-size:12px;font-family:monospace">${esc(e.message)}</div>`;
  }
}

async function renderAll() {
  renderToday();
  renderCalendar();
  renderInsights();
  renderRecents();
  renderIssues();
  await renderNotifications();
  await renderInbox();
  updateInboxBadge();
  updateHeaderSub();
  setTimeout(buildSearchIndex, 0);
}

function renderCalendar() {
  const el = document.getElementById('calendarView');
  if (!el) return;
  const today = todayStr();
  const year = calendarYear;
  const month = calendarMonth;

  const monthName = new Date(year, month, 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });

  // Build task map keyed by date string (active + done)
  const tasksByDate = {};
  allTasks.filter(t => !['Done','Cancelled'].includes(t.status) && t.date).forEach(t => {
    if (!tasksByDate[t.date]) tasksByDate[t.date] = [];
    tasksByDate[t.date].push({ ...t, _done: false });
  });
  allClosedTasks.filter(t => t.status === 'Done' && t.date).forEach(t => {
    if (!tasksByDate[t.date]) tasksByDate[t.date] = [];
    tasksByDate[t.date].push({ ...t, _done: true });
  });

  const statusColors = {
    'Open': '#58a6ff', 'In Progress': '#d29922', 'Waiting': '#db6d28',
    'Done': '#3fb950', 'Cancelled': '#f85149', 'Hold': '#bc8cff'
  };

  // Build grid cells
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  let cells = [];
  for (let i = firstDow - 1; i >= 0; i--) {
    const m = month === 0 ? 11 : month - 1;
    const y = month === 0 ? year - 1 : year;
    cells.push({ day: daysInPrev - i, month: m, year: y, otherMonth: true });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, month, year, otherMonth: false });
  }
  const remaining = 42 - cells.length;
  for (let i = 1; i <= remaining; i++) {
    const m = month === 11 ? 0 : month + 1;
    const y = month === 11 ? year + 1 : year;
    cells.push({ day: i, month: m, year: y, otherMonth: true });
  }

  const dows = ['S','M','T','W','T','F','S'];

  const gridHTML = cells.map(c => {
    const dateStr = `${c.year}-${String(c.month+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const tasks = tasksByDate[dateStr] || [];
    const isToday = dateStr === today;
    const isSelected = dateStr === calendarSelectedDay;

    const dots = tasks.slice(0, 4).map(t =>
      `<div class="cal-dot" style="background:${t._done ? 'var(--border)' : (statusColors[t.status] || '#58a6ff')}"></div>`
    ).join('');
    const more = tasks.length > 4 ? `<span class="cal-more">+${tasks.length - 4}</span>` : '';

    return `<div class="cal-day${c.otherMonth ? ' other-month' : ''}${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}"
                 onclick="selectCalDay('${dateStr}')">
      <div class="cal-day-num">${c.day}</div>
      <div class="cal-dots">${dots}${more}</div>
    </div>`;
  }).join('');

  let html = `
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <span class="cal-month-label">${monthName}</span>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      ${dows.map(d => `<div class="cal-dow">${d}</div>`).join('')}
      ${gridHTML}
    </div>`;

  // Selected day task list
  if (calendarSelectedDay) {
    const dayTasks = tasksByDate[calendarSelectedDay] || [];
    const [sy, sm, sd] = calendarSelectedDay.split('-').map(Number);
    const dateLabel = new Date(sy, sm - 1, sd).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    html += `<div class="cal-day-tasks">
      <div class="cal-day-tasks-header">
        <span>${dateLabel}</span>
        <span>${dayTasks.length} task${dayTasks.length !== 1 ? 's' : ''}</span>
      </div>
      ${dayTasks.length ? dayTasks.map(t => `
        <div class="card${t._done ? ' cal-card-done' : ''}" onclick="showTaskDetail('${t.id}')">
          <div class="card-title" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${priorityDotHTML(t.priority)}
            <span>${esc(t.name)}</span>
            ${typeBadgeHTML(t.type)}
          </div>
          <div class="card-meta">
            <span class="chip ${chipClass(t.status)}">${t.status}</span>
            ${t.bucket ? `<span class="space-pill">${esc(t.bucket)}</span>` : ''}
            ${t.project_name ? `<span class="space-pill">${esc(t.project_name)}</span>` : ''}
          </div>
        </div>`).join('') : '<div class="empty">No tasks this day</div>'}
    </div>`;
  }


  el.innerHTML = html;
}

function calNav(dir) {
  calendarMonth += dir;
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  renderCalendar();
}

function selectCalDay(dateStr) {
  calendarSelectedDay = calendarSelectedDay === dateStr ? null : dateStr;
  renderCalendar();
}

function updateHeaderSub() {
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('headerSub').textContent = today;
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function chipClass(status) {
  const map = {
    'Open': 'chip-open', 'In Progress': 'chip-progress', 'Waiting': 'chip-waiting',
    'Done': 'chip-done', 'Cancelled': 'chip-cancelled'
  };
  return map[status] || 'chip-open';
}

function typeBadgeHTML(type) {
  if (!type || type === 'task') return '';
  return `<span class="type-badge type-badge-${esc(type)}">${esc(type)}</span>`;
}

function priorityDotHTML(priority) {
  if (!priority) return '';
  return `<span class="priority-dot priority-dot-${esc(priority)}" title="Priority: ${esc(priority)}"></span>`;
}

// State for issues filter
let issuesFilterType = '';
let issuesFilterPriority = '';

function renderIssues() {
  const el = document.getElementById('issuesList');
  if (!el) return;

  const priorityOrder = { high: 0, medium: 1, low: 2 };
  const issueTasks = allTasks.filter(t => t.type && t.type !== 'task');

  const typeFilterVal = issuesFilterType;
  const priorityFilterVal = issuesFilterPriority;

  const filtered = issueTasks
    .filter(t => !typeFilterVal || t.type === typeFilterVal)
    .filter(t => !priorityFilterVal || t.priority === priorityFilterVal)
    .sort((a, b) => {
      const pa = priorityOrder[a.priority] ?? 3;
      const pb = priorityOrder[b.priority] ?? 3;
      if (pa !== pb) return pa - pb;
      return new Date(a.created_at || 0) - new Date(b.created_at || 0);
    });

  const filterBar = `
    <div class="task-filter-bar">
      <select onchange="issuesFilterType=this.value;renderIssues()">
        <option value="" ${!typeFilterVal ? 'selected' : ''}>All Types</option>

// Copy item title to clipboard so it can be pasted into Claude Co-work
function openInClaude(type, id, name) {
  const text = `For ${type.toLowerCase()} [${name}]`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => showToast(`Copied: ${text}`))
      .catch(() => _fallbackCopy(text));
  } else {
    _fallbackCopy(text);
  }
}

function _fallbackCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(el);
  el.focus();
  el.select();
  try {
    document.execCommand('copy');
    showToast(`Copied: ${text}`);
  } catch(e) {
    showToast('Copy failed — try again');
  }
  document.body.removeChild(el);
}

function isOverdue(task) {
  return task.date && task.date < todayStr() && !['Done','Cancelled'].includes(task.status);
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function truncate(s, n) {
  return s.length > n ? s.substring(0, n) + '...' : s;
}

function timeAgo(iso) {
  const d = new Date(iso);
  const now = new Date();
  const s = (now - d) / 1000;
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

async function loadRelatedItems(entityType, entityId) {
  try {
    const related = await api('rpc/fn_related', {
      method: 'POST',
      body: JSON.stringify({ p_type: entityType, p_id: entityId })
    });
    if (!related || related.length === 0) return [];

    // First pass: resolve names from in-memory caches
    for (const item of related) {
      if (item.entity_type === 'Task') {
        const found = allTasks.find(t => t.id === item.entity_id);
        item.name = found?.name || null;
      } else if (item.entity_type === 'Project') {
        const found = allProjects.find(p => p.id === item.entity_id);
        item.name = found?.name || null;
      } else if (item.entity_type === 'Space') {
        const found = allSpaces.find(s => s.id === item.entity_id);
        item.name = found?.name || null;
      } else if (item.entity_type === 'Inbox') {
        const found = allInbox.find(i => i.id === item.entity_id);
        item.name = found ? (found.title || found.body?.slice(0, 40) || null) : null;
      } else if (item.entity_type === 'Person') {
        const found = allPeople?.find(p => p.id === item.entity_id);
        item.name = found?.name || null;
      }
    }

    // Second pass: fetch items not in cache (archived inbox items, completed/archived tasks, notes)
    const missingInbox = related.filter(r => r.entity_type === 'Inbox' && !r.name).map(r => r.entity_id);
    const missingTasks = related.filter(r => r.entity_type === 'Task' && !r.name).map(r => r.entity_id);
    const missingNotes = related.filter(r => r.entity_type === 'Note' && !r.name).map(r => r.entity_id);
    const missingProjects = related.filter(r => r.entity_type === 'Project' && !r.name).map(r => r.entity_id);
    if (missingInbox.length > 0 || missingTasks.length > 0 || missingNotes.length > 0 || missingProjects.length > 0) {
      const extraInbox = {}, extraTasks = {}, extraNotes = {}, extraProjects = {};
      await Promise.all([
        missingInbox.length > 0 ? (async () => {
          try {
            const fetched = await api(`inbox?id=in.(${missingInbox.join(',')})&select=id,title,body`);
            if (fetched) fetched.forEach(i => {
              const snippet = i.body ? i.body.slice(0, 40) + (i.body.length > 40 ? '…' : '') : null;
              extraInbox[i.id] = i.title || snippet || 'Inbox Item';
            });
          } catch(e) { /* non-fatal */ }
        })() : Promise.resolve(),
        missingTasks.length > 0 ? (async () => {
          try {
            const fetched = await api(`tasks?id=in.(${missingTasks.join(',')})&select=id,name`);
            if (fetched) fetched.forEach(t => { extraTasks[t.id] = t.name || 'Task'; });
          } catch(e) { /* non-fatal */ }
        })() : Promise.resolve(),
        missingNotes.length > 0 ? (async () => {
          try {
            const fetched = await api(`notes?id=in.(${missingNotes.join(',')})&select=id,title,body`);
            if (fetched) fetched.forEach(n => {
              const snippet = n.body ? n.body.slice(0, 40) + (n.body.length > 40 ? '…' : '') : null;
              extraNotes[n.id] = n.title || snippet || 'Note';
            });
          } catch(e) { /* non-fatal */ }
        })() : Promise.resolve(),
        missingProjects.length > 0 ? (async () => {
          try {
            const fetched = await api(`projects?id=in.(${missingProjects.join(',')})&select=id,name`);
            if (fetched) fetched.forEach(p => { extraProjects[p.id] = p.name || 'Project'; });
          } catch(e) { /* non-fatal */ }
        })() : Promise.resolve()
      ]);
      for (const item of related) {
        if (!item.name) {
          if (item.entity_type === 'Inbox') item.name = extraInbox[item.entity_id] || 'Inbox Item';
          else if (item.entity_type === 'Task') item.name = extraTasks[item.entity_id] || 'Task';
          else if (item.entity_type === 'Note') item.name = extraNotes[item.entity_id] || 'Note';
          else if (item.entity_type === 'Project') item.name = extraProjects[item.entity_id] || 'Project';
        }
      }
    }

    // Final pass: fallback labels for anything still unresolved
    for (const item of related) {
      if (!item.name) item.name = item.entity_type;
    }

    return related;
  } catch (e) {
    console.warn('Failed to load related items:', e);
    return [];
  }
}

  }
}

async function renderInbox() {
  const el = document.getElementById('inboxList');
  const inboxItems = allInbox.filter(i => !isNotification(i));
  if (!inboxItems.length) { el.innerHTML = '<div class="empty">Inbox is clear</div>'; return; }

  const unread = inboxItems.filter(i => !i.read);
  const read = inboxItems.filter(i => i.read);

  // Fetch comment counts for all inbox items in parallel
  const counts = await Promise.all(
    inboxItems.map(item =>
      api(`comments?entity_type=eq.Inbox&entity_id=eq.${item.id}&select=id`)
        .then(c => c ? c.length : 0)
        .catch(() => 0)
    )
  );
  const commentCounts = Object.fromEntries(inboxItems.map((item, idx) => [item.id, counts[idx]]));

  function renderCard(i) {
    return `
    <div class="card" onclick="showInboxDetail('${i.id}')">
      <div class="card-title">${esc(i.title)}</div>
      ${i.body ? `<div class="card-body">${esc(truncate(i.body, 140))}</div>` : ''}
      <div class="card-meta" style="margin-top:6px">
        <span class="space-pill">${i.source || 'Chat'}</span>
        <span>${timeAgo(i.created_at)}</span>
        ${commentCounts[i.id] > 0 ? `<span style="color:var(--text-muted);font-size:12px">💬 ${commentCounts[i.id]}</span>` : ''}
      </div>
      <div class="enrichment-controls" style="display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 8px;flex:1" onclick="toggleInboxRead('${i.id}',${i.read},event)" title="${i.read ? 'Mark as unread' : 'Mark as read'}">
          ${i.read ? '● Unread' : '○ Read'}
        </button>
      </div>
    </div>`;
  }

  let html = unread.length ? unread.map(renderCard).join('') : '<div class="empty">No unread items</div>';

  if (read.length) {
    const readCollapsed = localStorage.getItem('inbox-read-collapsed') !== 'false';
    html += `
    <div class="collapsible-section${readCollapsed ? ' collapsed' : ''}" id="section-inbox-read">
      <div class="collapsible-header" onclick="toggleSectionPersist('section-inbox-read','inbox-read-collapsed')">
        <span>Read</span>
        <span class="section-meta"><span class="section-count">${read.length}</span><span class="chevron">▸</span></span>
      </div>
      <div class="collapsible-body">
        ${read.map(renderCard).join('')}
      </div>
    </div>`;
  }

  el.innerHTML = html;
}

  });

async function updateTaskDetail(id) {
  const status = document.getElementById('taskStatus').value;
  const dateEl = document.getElementById('taskDate');
  const date = dateEl ? (dateEl.value || null) : undefined;
  // If date is set, bucket must be null (schema rule: date set → bucket null)
  const bucketEl = document.getElementById('taskBucket');
  const bucket = date ? null : (bucketEl ? (bucketEl.value || null) : undefined);
  const priorityEl = document.getElementById('taskPriority');
  const priority = priorityEl ? (priorityEl.value || null) : undefined;
  await changeTaskStatus(id, status, bucket, date, priority);
}

function onTaskDateChange() {
  const date = document.getElementById('taskDate').value;
  const bucketEl = document.getElementById('taskBucket');
  const labelEl = document.getElementById('taskDateLabel');
  if (date) {
    bucketEl.disabled = true;
    bucketEl.style.opacity = '0.5';
    bucketEl.style.cursor = 'not-allowed';
    if (labelEl) { labelEl.style.display = ''; labelEl.innerHTML = '<span>⚠ Bucket disabled: task has a scheduled date</span>'; }
  } else {
    bucketEl.disabled = false;
    bucketEl.style.opacity = '';
    bucketEl.style.cursor = '';
    if (labelEl) { labelEl.style.display = 'none'; labelEl.innerHTML = ''; }
  }
}

function clearTaskDate() {
  const dateEl = document.getElementById('taskDate');
  if (dateEl) { dateEl.value = ''; onTaskDateChange(); }
}

async function showProjectDetail(id) {

  }
  if (!proj) return;
  const el = document.getElementById('detailBody');

  // Render shell immediately while tasks load
  el.innerHTML = `
    <h2>${esc(proj.name)}</h2>
    ${proj.body ? `<p style="color:var(--text-muted);font-size:14px;line-height:1.5;margin-bottom:16px;white-space:pre-wrap">${esc(proj.body)}</p>` : ''}
    <div class="section-header">Status</div>
    <div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap">
      <span class="chip ${chipClass(proj.status)}">${proj.status}</span>
    </div>

    <div class="detail-actions" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('detailModal')">Back</button>

    </div>
  `;
  openModal('detailModal');

  try {

    const tasksEl = document.getElementById('projectTasksBody');
    if (!tasksEl) return;
    if (!tasks.length) {
      tasksEl.innerHTML = '<div class="empty" style="padding:20px 0">No tasks in this project</div>';
      return;
    }
    // Separate top-level tasks from subtasks
    const topLevel = tasks.filter(t => !t.parent_task_id);
    const subtaskMap = {};
    tasks.filter(t => t.parent_task_id).forEach(t => {
      if (!subtaskMap[t.parent_task_id]) subtaskMap[t.parent_task_id] = [];
      subtaskMap[t.parent_task_id].push(t);
    });
    function renderTaskCard(t, isSubtask) {
      const subs = subtaskMap[t.id] || [];
      return `
        <div class="card${isSubtask ? '' : ''}" style="${isSubtask ? 'margin-left:16px;border-left:2px solid var(--border)' : ''}" onclick="closeModal('detailModal');setTimeout(()=>showTaskDetail('${t.id}'),300)">
          <div class="card-title">${isSubtask ? '<span style="color:var(--text-muted);font-size:11px;margin-right:4px">↳</span>' : ''}${esc(t.name)}</div>
          <div class="card-meta">
            <span class="chip ${chipClass(t.status)}">${t.status}</span>
            ${t.date ? `<span>${formatDate(t.date)}</span>` : ''}
            ${t.bucket ? `<span class="space-pill">${esc(t.bucket)}</span>` : ''}
            ${subs.length ? `<span style="color:var(--text-muted);font-size:11px">${subs.length} subtask${subs.length>1?'s':''}</span>` : ''}
          </div>
        </div>
        ${subs.map(s => renderTaskCard(s, true)).join('')}
      `;
    }
    tasksEl.innerHTML = `
      <div class="section-header">Tasks (${topLevel.length}${Object.keys(subtaskMap).length ? ` · ${tasks.length - topLevel.length} subtasks` : ''})</div>
      ${topLevel.map(t => renderTaskCard(t, false)).join('')}
    `;
  } catch (e) {
    const tasksEl = document.getElementById('projectTasksBody');
    if (tasksEl) tasksEl.innerHTML = `<div class="empty" style="color:var(--red)">Failed to load tasks</div>`;
  }
  // Load comments and related items for project
  loadComments('Project', id).then(comments => {
    const el = document.getElementById('detailBody');
    if (el) el.insertAdjacentHTML('beforeend', renderCommentThread(comments, 'Project', id));
  });
  loadRelatedItems('Project', id).then(related => {
    const el = document.getElementById('detailBody');
    if (el) el.insertAdjacentHTML('beforeend', renderRelatedItems(related));
  });
}

  function getDescendants(parentId) {
    const direct = allSpaceTree.filter(s => s.parent_space_id === parentId);
    let all = [...direct];
    direct.forEach(s => {
      all = all.concat(getDescendants(s.id));
    });
    return all;
  }

  const descendants = getDescendants(id);
  const descendantIds = descendants.map(s => s.id);

  const allSpaceIds = [id, ...descendantIds];
  const projs = allProjects.filter(p => allSpaceIds.includes(p.space_id));
  const tasks = allTasks.filter(t => allSpaceIds.includes(t.space_id));

    <h2>${esc(space.name)}</h2>

    ${descendants.length ? `
      <div class="section-header">Child Spaces (${descendants.length})</div>

async function markDone(id) {
  try {
    await api(`tasks?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'Done', completed_at: new Date().toISOString() })
    });
    showToast('Task completed!');
    closeModal('detailModal');
    await loadAll();
  } catch (e) { showToast('Failed: ' + e.message, true); }
}

async function changeTaskStatus(id, status, bucket = undefined, date = undefined, priority = undefined) {
  try {
    const body = { status };
    if (status === 'Done') body.completed_at = new Date().toISOString();
    if (bucket !== undefined) body.bucket = bucket;
    if (date !== undefined) body.date = date;
    if (priority !== undefined) body.priority = priority;
    await api(`tasks?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(body) });
    let msg = `Status → ${status}`;
    if (bucket !== undefined) msg += ` | Bucket → ${bucket || 'None'}`;
    if (date !== undefined) msg += ` | Date → ${date || 'None'}`;
    if (priority !== undefined) msg += ` | Priority → ${priority || 'None'}`;
    showToast(msg);
    closeModal('detailModal');
    await loadAll();
  } catch (e) { showToast('Failed: ' + e.message, true); }
}

async function archiveInbox(id) {
  try {
    await api(`inbox?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ archived: true })
    });
    showToast('Dismissed');
    closeModal('detailModal');
    await loadAll();
  } catch (e) { showToast('Failed: ' + e.message, true); }
}

async function toggleInboxRead(id, currentRead, event) {
  event.stopPropagation();
  const item = allInbox.find(i => i.id === id);
  if (!item) return;
  const newRead = !currentRead;
  try {
    await api(`inbox?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ read: newRead })
    });
    item.read = newRead;
    showToast(newRead ? '○ Marked read' : '● Marked unread');
    await renderInbox();
    updateInboxBadge();
  } catch(e) { showToast('Failed: ' + e.message, true); }
}


function openAddModal() {
  if (currentView === 'inbox') {
    openAddInbox();
  } else {
    openAddTask();
  }
}

function openAddTask() {
  document.getElementById('addModalTitle').textContent = 'Add Task';

  const projectsBySpace = {};
  allProjects.forEach(p => {
    const spaceName = p.space_name || 'No Space';
    if (!projectsBySpace[spaceName]) {
      projectsBySpace[spaceName] = [];
    }
    projectsBySpace[spaceName].push(p);
  });

  const sortedSpaces = Object.keys(projectsBySpace).sort();

  let projectOptions = '<option value="">No project</option>';
  sortedSpaces.forEach(spaceName => {
    projectOptions += `<optgroup label="${esc(spaceName)}">`;
    projectsBySpace[spaceName].forEach(p => {
      projectOptions += `<option value="${p.id}" data-space="${p.space_id}">${esc(p.name)}</option>`;
    });
    projectOptions += '</optgroup>';
  });

  document.getElementById('addModalBody').innerHTML = `
    <label>Task Name</label>
    <input id="newTaskName" placeholder="What needs doing?" autocomplete="off">
    <label>Project</label>
    <select id="newTaskProject">
      ${projectOptions}
    </select>
    <label>Date (optional)</label>
    <input id="newTaskDate" type="date">
    <label>Notes (optional)</label>
    <textarea id="newTaskBody" placeholder="Any details..." rows="2"></textarea>
  `;
  document.getElementById('addModalSubmit').onclick = submitAddTask;
  openModal('addModal');
  setTimeout(() => document.getElementById('newTaskName').focus(), 300);
}

async function submitAddTask() {
  const name = document.getElementById('newTaskName').value.trim();
  if (!name) { showToast('Name is required', true); return; }

  const projectId = document.getElementById('newTaskProject').value || null;
  const date = document.getElementById('newTaskDate').value || null;
  const body = document.getElementById('newTaskBody').value.trim() || null;

  let spaceId = null;
  if (projectId) {
    const opt = document.querySelector(`#newTaskProject option[value="${projectId}"]`);
    spaceId = opt?.dataset.space || null;
  }

  const task = { name, status: 'Open', project_id: projectId, space_id: spaceId, date, body };
  if (!date) task.bucket = 'Needs Doing';

  try {
    await api('tasks', { method: 'POST', body: JSON.stringify(task) });
    showToast('Task added!');
    closeModal('addModal');
    await loadAll();
  } catch (e) { showToast('Failed: ' + e.message, true); }
}

function openAddInbox() {
  document.getElementById('addModalTitle').textContent = 'Quick Capture';
  document.getElementById('addModalBody').innerHTML = `

function openModal(id) {

}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(el => {

document.querySelectorAll('.tab').forEach(tab => {

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), isError ? 8000 : 2000);
}

// === Notifications & Flags ===

function isNotification(item) {
  return item.title && item.title.startsWith('Claude reply:');
}

function getEntityName(entityType, entityId) {
  if (entityType === 'Task') return allTasks.find(t => t.id === entityId)?.name || 'Task';
  if (entityType === 'Project') return allProjects.find(p => p.id === entityId)?.name || 'Project';
  if (entityType === 'Inbox') {
    const inboxItem = allInbox.find(i => i.id === entityId);
    if (inboxItem) {
      const bodySnippet = inboxItem.body ? inboxItem.body.slice(0, 40) + (inboxItem.body.length > 40 ? '…' : '') : null;
      return inboxItem.title || bodySnippet || 'Inbox Item';
    }
    return 'Inbox Item';
  }
  if (entityType === 'Space') return allSpaces.find(s => s.id === entityId)?.name || 'Space';
  return entityType;
}

async function renderNotifications() {
  const el = document.getElementById('notificationsList');
  if (!el) return;
  const notifications = allInbox.filter(isNotification);
  if (notifications.length === 0) {
    el.innerHTML = '';
    return;
  }
  const notifCollapsed = localStorage.getItem('notif-section-collapsed') === 'true';
  el.innerHTML = `
    <div class="collapsible-section${notifCollapsed ? ' collapsed' : ''}" id="section-notifications">
      <div class="collapsible-header" onclick="toggleSectionPersist('section-notifications', 'notif-section-collapsed')">
        <span>Notifications</span>
        <span class="section-meta"><span class="section-count">${notifications.length}</span><span class="chevron">▸</span></span>
      </div>
      <div class="collapsible-body">
        ${notifications.map(n => `
          <div class="card notification-card">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
              <div class="card-title" style="flex:1">${esc(n.title.replace(/^Claude reply:\s*/i, ''))}</div>
              <button
                onclick="archiveInbox('${n.id}')"
                style="flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;line-height:1;padding:0 2px"
                title="Clear notification">✕</button>
            </div>
            ${n.body ? `<div class="card-body">${esc(truncate(n.body, 120))}</div>` : ''}
            <div id="notif-chips-${n.id}" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
            <div class="card-meta" style="margin-top:6px">
              <span class="notification-label">✦ Claude</span>
              <span>${timeAgo(n.created_at)}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>
    <div class="section-header" style="margin-top:16px">Inbox</div>
  `;

  // Immediately render cached chips synchronously — prevents the "chips disappear then
  // reappear" flicker on every 30s refresh cycle. Cache is populated after first fetch.
  for (const n of notifications) {
    const cached = notifChipCache[n.id];
    if (cached !== undefined) {
      const chipsEl = document.getElementById(`notif-chips-${n.id}`);
      if (chipsEl) chipsEl.innerHTML = cached;
    }
  }

  // Fetch all notification chip data in parallel to avoid sequential layout shifts
  const chipDataPerNotif = await Promise.all(notifications.map(async n => {
    const relatedItems = [];

    // Primary linked item from item_type/item_id
    if (n.item_id && n.item_type) {
      relatedItems.push({ entity_type: n.item_type, entity_id: n.item_id });
    }

    // Additional items from related_items table
    try {
      const rows = await api(`related_items?or=(a_id.eq.${n.id},b_id.eq.${n.id})&select=a_type,a_id,b_type,b_id`);
      if (rows) {
        for (const r of rows) {
          const entityType = r.a_id === n.id ? r.b_type : r.a_type;
          const entityId   = r.a_id === n.id ? r.b_id   : r.a_id;
          if (!relatedItems.find(i => i.entity_id === entityId)) {
            relatedItems.push({ entity_type: entityType, entity_id: entityId });
          }
        }
      }
    } catch(e) { /* non-fatal */ }

    if (relatedItems.length === 0) return { id: n.id, html: '' };

    // Fetch titles for Inbox entities not in allInbox (e.g. archived ones)
    const missingInboxIds = relatedItems
      .filter(r => r.entity_type === 'Inbox' && !allInbox.find(i => i.id === r.entity_id))
      .map(r => r.entity_id);
    const extraInboxTitles = {};
    // Fetch names for Task entities not in allTasks (e.g. completed/archived ones)
    const missingTaskIds = relatedItems
      .filter(r => r.entity_type === 'Task' && !allTasks.find(t => t.id === r.entity_id))
      .map(r => r.entity_id);
    const extraTaskNames = {};

    // Run both lookups in parallel
    await Promise.all([
      (async () => {
        if (missingInboxIds.length > 0) {
          try {
            const fetched = await api(`inbox?id=in.(${missingInboxIds.join(',')})&select=id,title,body`);
            if (fetched) fetched.forEach(i => {
              const bodySnippet = i.body ? i.body.slice(0, 40) + (i.body.length > 40 ? '…' : '') : null;
              extraInboxTitles[i.id] = i.title || bodySnippet || 'Inbox Item';
            });
          } catch(e) { /* non-fatal */ }
        }
      })(),
      (async () => {
        if (missingTaskIds.length > 0) {
          try {
            const fetched = await api(`tasks?id=in.(${missingTaskIds.join(',')})&select=id,name`);
            if (fetched) fetched.forEach(t => { extraTaskNames[t.id] = t.name || 'Task'; });
          } catch(e) { /* non-fatal */ }
        }
      })()
    ]);

    const html = relatedItems.map(r => {
      const name = (r.entity_type === 'Inbox' && extraInboxTitles[r.entity_id])
        ? extraInboxTitles[r.entity_id]
        : (r.entity_type === 'Task' && extraTaskNames[r.entity_id])
        ? extraTaskNames[r.entity_id]
        : getEntityName(r.entity_type, r.entity_id);
      return `<button
        class="chip"
        style="cursor:pointer;background:var(--surface2);color:var(--accent);text-transform:none;letter-spacing:0;font-size:11px;border:none;padding:4px 10px;border-radius:99px"
        onclick="navigateToRelated('${r.entity_type}','${r.entity_id}')">
        ${esc(r.entity_type)}: ${esc(name)}
      </button>`;
    }).join('');

    return { id: n.id, html };
  }));

  // Update cache and write to DOM only if data changed — prevents unnecessary reflows
  for (const { id, html } of chipDataPerNotif) {
    if (notifChipCache[id] !== html) {
      notifChipCache[id] = html;
      const chipsEl = document.getElementById(`notif-chips-${id}`);
      if (chipsEl) chipsEl.innerHTML = html;
    }
  }
}


// === Comment Thread Functions ===
let currentCommentEntity = null; // { type: 'task'|'project', id: '...' }

function personIcon() {
  return '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M 4 20 Q 4 14 12 14 Q 20 14 20 20"/></svg>';
}
function sparkleIcon() {
  return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7h7l-5 4 2 7-7-5-7 5 2-7-5-4h7l3-7z"/></svg>';
}
function checkIcon() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
}

async function loadComments(entityType, entityId) {
  try {
    const comments = await api(`comments?entity_type=eq.${entityType}&entity_id=eq.${entityId}&order=created_at.asc`);
    return comments || [];
  } catch (e) {
    console.warn('Failed to load comments:', e);
    return [];
  }
}


function renderCommentThread(comments, entityType, entityId, readonly = false) {
  currentCommentEntity = { type: entityType, id: entityId };
  let html = '<div class="comment-thread">';
  html += '<div class="section-header">Comments</div>';
  html += '<div class="thread" id="commentThread">';

  if (comments.length === 0) {
    html += '<div style="font-size:13px;color:var(--text-muted);padding:8px 0">No comments yet</div>';
  }

  for (const c of comments) {
    const isClaude = c.actor === 'Claude';
    const avatar = isClaude ? sparkleIcon() : personIcon();
    const time = timeAgo(c.created_at);
    const modelBadge = isClaude && c.model ? `<span class="comment-model">${esc(c.model)}</span>` : '';

    // Claude stores replies as JSON: { reply, ... } — extract display text if JSON-wrapped
    let displayBody = c.body;
    if (isClaude && c.body) {
      try {
        let raw = c.body.trim();
        raw = raw.replace(/^```[a-zA-Z]*\s*/, '').replace(/\s*```\s*$/, '').trim();
        const parsed = JSON.parse(raw);
        if (parsed && parsed.reply) displayBody = parsed.reply;
      } catch (e) { /* plain text body, use as-is */ }
    }

    html += `
      <div class="comment-card ${isClaude ? 'claude' : ''}">
        <div class="comment-avatar">${avatar}</div>
        <div class="comment-body">
          <div class="comment-header">
            <span class="comment-author">${esc(c.actor)}</span>
            ${modelBadge}
            <span class="comment-time">${time}</span>
          </div>
          <div class="comment-text">${esc(displayBody)}</div>
        </div>
      </div>`;
  }

  html += '</div>'; // close thread

  // Comment input
  if (readonly) {
    html += `<div style="margin-top:12px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted);text-align:center">Archived — commenting disabled</div>`;
  } else {
    html += `
    <div class="comment-input">
      <div class="comment-input-row">
        <textarea class="comment-textarea" id="commentTextarea" placeholder="Add a comment..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();postComment()}"></textarea>
        <button class="comment-send-btn" onclick="postComment()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 5 19 12 12 19"/><polyline points="19 12 5 12"/></svg>
        </button>
      </div>
    </div>`;
  }

  html += '</div>'; // close comment-thread
  return html;
}


async function postComment() {
  const ta = document.getElementById('commentTextarea');
  if (!ta || !currentCommentEntity) return;
  const body = ta.value.trim();
  if (!body) return;

  try {
    ta.value = '';
    await api('comments', { method: 'POST', body: JSON.stringify({
      entity_type: currentCommentEntity.type,
      entity_id: currentCommentEntity.id,
      actor: 'Shureed',
      body: body
    })});

    // Reload comments
    const comments = await loadComments(currentCommentEntity.type, currentCommentEntity.id);
    const threadEl = document.querySelector('.comment-thread');
    if (threadEl) {
      threadEl.outerHTML = renderCommentThread(comments, currentCommentEntity.type, currentCommentEntity.id);
      const newThread = document.getElementById('commentThread');
      if (newThread) newThread.scrollTop = newThread.scrollHeight;
    }
  } catch (e) {
    showToast('Failed to post comment: ' + e.message, true);
  }
}

// === Fuzzy Search Functions ===
let fuseIndex = null;
let searchItems = [];

// Normalize text for fuzzy indexing: replace punctuation separators with spaces
// so "post-processing — periodic job" becomes "post processing periodic job"
function normalizeSearchText(str) {
  return (str || '').replace(/[-\u2014:\u00B7]/g, ' ').replace(/\s+/g, ' ').trim();
}

function buildSearchIndex() {
  searchItems = [];

  // Add active tasks
  allTasks.forEach(t => {
    searchItems.push({
      type: 'Task',
      id: t.id,
      name: t.name,
      title: t.name,
      meta: t.status,
      closed: false,
      searchText: normalizeSearchText(`${t.name} ${t.status}`),
      handler: () => showTaskDetail(t.id)
    });
  });

  // Add closed tasks
  allClosedTasks.forEach(t => {
    searchItems.push({
      type: 'Task',
      id: t.id,
      name: t.name,
      title: t.name,
      meta: t.status,
      closed: true,
      searchText: normalizeSearchText(`${t.name} ${t.status}`),
      handler: () => showTaskDetail(t.id)
    });
  });

  // Add active projects
  allProjects.forEach(p => {
    searchItems.push({
      type: 'Project',
      id: p.id,
      name: p.name,
      title: p.name,
      meta: p.status,
      closed: false,
      searchText: normalizeSearchText(`${p.name} ${p.status}`),
      handler: () => showProjectDetail(p.id)
    });
  });

  // Add closed projects
  allClosedProjects.forEach(p => {
    searchItems.push({
      type: 'Project',
      id: p.id,
      name: p.name,
      title: p.name,
      meta: p.status,
      closed: true,
      searchText: normalizeSearchText(`${p.name} ${p.status}`),
      handler: () => showProjectDetail(p.id)
    });
  });

  // Add spaces
  allSpaces.forEach(s => {
    searchItems.push({
      type: 'Space',
      id: s.id,
      name: s.name,
      title: s.name,
      meta: s.body ? truncate(s.body, 30) : '',
      searchText: normalizeSearchText(`${s.name} ${s.body || ''}`),
      handler: () => showSpaceDetail(s.id)
    });
  });

  // Add inbox items
  allInbox.forEach(i => {
    searchItems.push({
      type: 'Inbox',
      id: i.id,
      name: i.title,
      title: i.title,
      meta: i.source || 'Chat',
      searchText: normalizeSearchText(`${i.title} ${i.body || ''}`),
      handler: () => showInboxDetail(i.id)
    });
  });

  // Build Fuse index
  const fuseOptions = {
    keys: ['searchText'],
    threshold: 0.35,
    minMatchCharLength: 2
  };
  fuseIndex = new Fuse(searchItems, fuseOptions);
}

let searchDebounceTimer;
function handleSearchInput() {
  clearTimeout(searchDebounceTimer);
  const input = document.getElementById('searchInput');
  const query = input.value.trim();
  const resultsEl = document.getElementById('searchResults');

  if (!query) {
    resultsEl.classList.remove('visible');
    return;
  }

  searchDebounceTimer = setTimeout(() => {
    if (!fuseIndex) return;

    let results = fuseIndex.search(query);
    // Filter closed items unless toggle is ON
    if (!showClosedSearch) {
      results = results.filter(r => !r.item.closed);
    }
    results = results.slice(0, 10);

    if (results.length === 0) {
      resultsEl.innerHTML = '<div class="search-empty">No results found</div>';
      resultsEl.classList.add('visible');
      return;
    }

    let html = '';
    for (const result of results) {
      const item = result.item;
      const closedClass = item.closed ? ' closed' : '';
      html += `
        <div class="search-result-item${closedClass}" onclick="event.stopPropagation();searchResultClick('${item.id}','${item.type}')">
          <div class="search-result-type">${esc(item.type)}</div>
          <div class="search-result-title">${esc(item.title)}</div>
          ${item.meta ? `<div class="search-result-meta">${esc(item.meta)}</div>` : ''}
        </div>`;
    }
    resultsEl.innerHTML = html;
    resultsEl.classList.add('visible');
  }, 200);
}

function searchResultClick(itemId, itemType) {
  const item = searchItems.find(i => i.id === itemId && i.type === itemType);
  if (item && item.handler) {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').classList.remove('visible');
    item.handler();
  }
}

function toggleShowClosed() {
  showClosedSearch = !showClosedSearch;
  sessionStorage.setItem('showClosedSearch', showClosedSearch);
  const toggleEl = document.getElementById('showClosedToggle');
  if (toggleEl) toggleEl.classList.toggle('active', showClosedSearch);
  // Re-run search if there's an active query
  const input = document.getElementById('searchInput');
  if (input && input.value.trim()) handleSearchInput();
}

function initSearchToggle() {
  const toggleEl = document.getElementById('showClosedToggle');
  if (toggleEl) toggleEl.classList.toggle('active', showClosedSearch);
}

// Close search results when clicking outside search area
document.addEventListener('click', (e) => {
  const searchBar = document.querySelector('.search-bar-container');
  const searchToggle = document.getElementById('showClosedToggle');
  const isInsideSearch = (searchBar && searchBar.contains(e.target)) || (searchToggle && searchToggle.contains(e.target));
  if (!isInsideSearch) {
    document.getElementById('searchResults').classList.remove('visible');
  }
});

document.addEventListener('DOMContentLoaded', async () => {
  const client = getSupabaseClient();

  // Keep _session current and react to sign-in/sign-out events
  client.auth.onAuthStateChange((event, session) => {
    _session = session;
    if (session) {
      startApp();
    } else {
      if (_loadInterval) { clearInterval(_loadInterval); _loadInterval = null; }
      document.getElementById('loginGate').style.display = 'flex';
    }
  });

  // getSession resolves the magic link token from the URL hash automatically
  const { data: { session } } = await client.auth.getSession();
  _session = session;

  if (session) {
    startApp();
  } else {
    document.getElementById('loginGate').style.display = 'flex';
  }

  // Setup search input listener
  document.getElementById('searchInput').addEventListener('input', handleSearchInput);
  // Initialize Show Closed toggle visual state
  initSearchToggle();
});
</script>
